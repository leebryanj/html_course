<!-- DOCTYPE declaration that should be at the start of every html file. Not an html element or tag. -->
<!DOCTYPE html>
<!-- All html elements live inside the html root tag. -->
<html lang="en">
<!-- Each html page has 2 main elements: head and body.
    head contains data not seen on the page, but contains metadata about the page. -->

<head>
    <!-- "charset" is an attribute for meta -->
    <meta charset="UTF-8">
    <title>A Web Page</title>
    <style>
        html {
            font-size: 22px;
        }

        body {
            background-color: #333;
            color: whitesmoke;
        }
    </style>
</head>
<!-- body is the part of the page that everybody sees in the browser -->

<body>
    <h1>Hello World!</h1>
    <p>This is a web page.</p>
</body>

</html>
